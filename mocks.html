<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLEDAY - アプリモック</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#f5f5f7;color:#1c1c1e;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
}
/* Header */
.page-header{
  width:100%;padding:16px 24px;
  background:rgba(245,245,247,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid #e5e5ea;position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  max-width:100%;
}
.page-header .logo{
  font-size:20px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,#ff6b6b,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.back-link{
  color:#8e8e93;text-decoration:none;font-size:13px;font-weight:600;
  transition:color .2s;
}
.back-link:hover{color:#1c1c1e}

/* Tabs */
.mock-tabs{
  display:flex;gap:8px;padding:20px 24px 12px;
  max-width:100%;overflow-x:auto;flex-wrap:wrap;justify-content:center;
}
.mock-tab{
  padding:10px 18px;border-radius:12px;border:1px solid #e5e5ea;
  background:#fff;font-size:13px;font-weight:600;color:#8e8e93;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.mock-tab:hover{border-color:#ff6b6b;color:#ff6b6b}
.mock-tab.active{
  background:linear-gradient(135deg,#ff6b6b,#e85555);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 12px rgba(255,107,107,0.3);
}

/* Mock container */
.mock-container{
  padding:20px;display:flex;justify-content:center;
}
#mock-root{
  border-radius:28px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
}

/* Loading */
.loading{
  padding:40px;text-align:center;color:#8e8e93;font-size:14px;
}

/* Info text */
.info-text{
  text-align:center;padding:8px 24px 24px;font-size:12px;color:#8e8e93;
  max-width:500px;
}
</style>
</head>
<body>

<div class="page-header">
  <div class="logo">SOLEDAY</div>
  <a href="index.html" class="back-link">&#x2190; トップページに戻る</a>
</div>

<div class="mock-tabs">
<button class="mock-tab active" onclick="switchMock('HomeScreen', this)">🏠 ホーム</button>
<button class="mock-tab " onclick="switchMock('MoveScreen', this)">👟 ムーブ</button>
<button class="mock-tab " onclick="switchMock('CraftScreen', this)">🔨 クラフト工房</button>
<button class="mock-tab " onclick="switchMock('CollectionScreen', this)">🎁 コレクション</button>
<button class="mock-tab " onclick="switchMock('SocialScreen', this)">👥 ソーシャル</button>

</div>

<div class="mock-container">
  <div id="mock-root">
    <div class="loading">モック読み込み中...</div>
  </div>
</div>

<div class="info-text">
  実際のJSXモックコンポーネントをReactでリアルタイムレンダリングしています。<br>
  タブをクリックして各画面を切り替えできます。インタラクティブな要素も動作します。
</div>

function switchMock(name, btn) {

  document.querySelectorAll('.mock-tab').forEach(t => t.classList.remove('active'));

}

setTimeout(() => switchMock('HomeScreen', document.querySelector('.mock-tab.active')), 100);
